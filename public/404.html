<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gmash Website</title>
    <script>
      (async function () {
        try {
          const response = await fetch("/index.html", { cache: "no-store" });
          const html = await response.text();
          document.open();
          document.write(html);
          document.close();
        } catch (error) {
          document.body.innerHTML =
            '<p style="font-family: sans-serif; padding: 2rem;">Unable to load the site.</p>';
        }
      })();
    </script>
  </head>
  <body></body>
</html>
